name: OrangeHRM E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  CI: true
  headless: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  e2e-tests:
    name: Java Selenium E2E (all modules)
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Verify full suite definition
        run: |
          test_count=$(grep -h '@Test' src/test/java/com/orangehrm/tests/*.java | wc -l | tr -d ' ')
          echo "TestNG @Test methods: ${test_count}"
          if [ "${test_count}" -ne 72 ]; then
            echo "Expected 72 @Test methods across module test classes, found ${test_count}"
            exit 1
          fi
          mvn -q test-compile -B

      - name: Run full E2E TestNG suite (72 tests)
        id: test
        run: mvn clean test -B

      - name: Publish test summary (pass / fail counts)
        if: always() && steps.test.outcome != 'cancelled'
        run: python3 .github/scripts/publish-test-summary.py

      - name: Publish test report to Checks
        if: always() && steps.test.outcome != 'cancelled'
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: target/surefire-reports/TEST-*.xml
          check_name: OrangeHRM E2E Results
          comment_title: OrangeHRM E2E Test Results
          report_individual_runs: false

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: target/screenshots/
          retention-days: 7
          if-no-files-found: ignore
